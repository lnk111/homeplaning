<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복리 계산기 | 매달 적립 시 자산 성장 시뮬레이션 — 홈플래닝</title>
  <meta name="description" content="초기금액·매월 적립액·수익률·기간을 넣으면 복리로 자산이 얼마나 불어나는지 그래프로 계산. 단리 vs 복리 비교까지." />
  <meta name="keywords" content="복리 계산기, 적립식 투자, 복리의 힘, 자산 성장 계산기, 월 적립 계산" />
  <link rel="canonical" href="https://homeplaning.kr/calculators/compound.html" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="app-header"></div>
  <main class="wrap" style="padding-top:32px">
    <div class="eyebrow">복리 계산기</div>
    <h1 style="font-size:clamp(26px,4.5vw,36px);color:var(--navy)">복리의 눈덩이, 얼마나 커질까?</h1>
    <p class="muted" style="margin:10px 0 24px;max-width:640px">매달 꾸준히 모으면 복리로 자산이 어떻게 불어나는지 계산합니다.</p>

    <div class="calc-layout">
      <div class="card card-pad">
        <div class="field">
          <label>초기 투자금</label>
          <div class="input-suffix"><input class="input" type="number" id="initial" value="1000" min="0" step="100"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>매월 적립액</label>
          <div class="input-suffix"><input class="input" type="number" id="monthly" value="50" min="0" step="5" inputmode="numeric" autocomplete="off"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>연 수익률 <span class="hint">기대 수익률</span></label>
          <div class="input-suffix"><input class="input" type="number" id="rate" value="7" min="0" max="30" step="0.5" inputmode="decimal" autocomplete="off"><span class="suffix">%</span></div>
        </div>
        <div class="field">
          <label>투자 기간</label>
          <div class="input-suffix"><input class="input" type="number" id="years" value="20" min="1" max="60" step="1" inputmode="numeric" autocomplete="off"><span class="suffix">년</span></div>
        </div>
      </div>

      <div>
        <div class="result-hero">
          <div class="label"><span id="yr-label">20</span>년 후 예상 자산</div>
          <div class="big"><span id="r-final">–</span></div>
        </div>
        <div class="stat-row" style="margin-bottom:12px">
          <div class="stat"><div class="k">총 납입 원금</div><div class="v" id="r-principal">–</div></div>
          <div class="stat"><div class="k">투자 수익</div><div class="v accent" id="r-profit">–</div></div>
        </div>
        <div class="card" style="margin-bottom:12px">
          <h3 style="font-size:16px;color:var(--navy);margin-bottom:10px">연도별 자산 성장</h3>
          <div id="chart" class="chart-box"></div>
        </div>
        <div class="card">
          <h3 style="font-size:16px;color:var(--navy);margin-bottom:6px">단리 vs 복리</h3>
          <p class="small muted" id="compare-txt" style="margin:0"></p>
        </div>
        <div class="lead-cta">
          <h3>목표까지 얼마 남았나요?</h3>
          <p>이 수익률로 1억·3억 모으는 데 걸리는 시간은 자산목표 계산기에서 확인하세요.</p>
          <a class="btn btn-ghost" href="goal.html">자산목표 계산 →</a>
        </div>
        <p class="note">※ 수익률은 미래를 보장하지 않는 가정값입니다. 결과는 참고용 추정치입니다.</p>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>

  <script src="../assets/js/app.js"></script>
  <script>
    const S = { initial: 1000, monthly: 50, rate: 7, years: 20 };
    function grow(monthlyContribute, annualRate, years, initial) {
      const r = annualRate / 100 / 12, n = years * 12;
      let bal = initial;
      const yearly = [];
      for (let m = 1; m <= n; m++) {
        bal = bal * (1 + r) + monthlyContribute;
        if (m % 12 === 0) yearly.push(bal);
      }
      return { final: bal, yearly };
    }
    function render() {
      const { final, yearly } = grow(S.monthly, S.rate, S.years, S.initial);
      const principal = S.initial + S.monthly * S.years * 12;
      const profit = final - principal;
      document.getElementById("r-final").innerHTML = HP.fmtMan(final) + '<span class="unit"> 원</span>';
      document.getElementById("r-principal").textContent = HP.fmtMan(principal);
      document.getElementById("r-profit").textContent = HP.fmtMan(profit);
      document.getElementById("yr-label").textContent = S.years;
      // chart: pick ~8 checkpoints, 원금(아래)+투자수익(위) 누적 막대
      const step = Math.max(1, Math.round(yearly.length / 8));
      const series = [];
      const addPoint = (i) => {
        const y = i + 1;
        const principal = S.initial + S.monthly * 12 * y; // 그해까지 납입 원금
        const total = yearly[i];
        const profit = Math.max(0, total - principal);
        series.push({
          label: y + "년",
          parts: [
            { value: Math.min(principal, total), color: "var(--navy)" },
            { value: profit, color: "var(--accent)" },
          ],
        });
      };
      for (let i = step - 1; i < yearly.length; i += step) addPoint(i);
      if (series[series.length - 1].label !== yearly.length + "년") addPoint(yearly.length - 1);
      HP.stackedBars(document.getElementById("chart"), series, {
        legend: [
          { label: "원금", color: "var(--navy)" },
          { label: "투자수익", color: "var(--accent)" },
        ],
      });
      // 단리 비교
      const simple = S.initial * (1 + (S.rate / 100) * S.years) + S.monthly * 12 * S.years; // 대략 단리(원금 이자 미포함 근사)
      const diff = final - simple;
      document.getElementById("compare-txt").innerHTML =
        `같은 조건을 단리로 계산하면 약 <strong>${HP.fmtMan(simple)}</strong>. 복리는 <strong style="color:var(--accent)">${HP.fmtMan(diff)}</strong> 더 많습니다. 시간이 길수록 격차는 커집니다.`;
    }
    ["initial", "monthly", "rate"].forEach((id) =>
      document.getElementById(id).oninput = (e) => { S[id] = +e.target.value || 0; render(); });
    document.getElementById("years").oninput = (e) => { S.years = +e.target.value || 1; render(); };
    HP.mount("compound");
    render();
  </script>
</body>
</html>
