<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월급배분 계산기 | 실수령액 저축·투자·소비 자동 배분 — 홈플래닝</title>
  <meta name="description" content="월 실수령액을 넣으면 50-30-20 등 원칙에 따라 고정지출·생활비·저축·투자로 자동 배분. 사회초년생 예산 관리." />
  <meta name="keywords" content="월급배분 계산기, 50 30 20 법칙, 예산 관리, 사회초년생 재테크, 월급 관리" />
  <link rel="canonical" href="https://homeplaning.kr/calculators/salary.html" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="app-header"></div>
  <main class="wrap" style="padding-top:32px">
    <div class="eyebrow">월급배분 계산기</div>
    <h1 style="font-size:clamp(26px,4.5vw,36px);color:var(--navy)">월급, 어떻게 나눠야 할까?</h1>
    <p class="muted" style="margin:10px 0 24px;max-width:640px">실수령액을 넣으면 검증된 예산 원칙으로 자동 배분합니다. 비율은 직접 조정할 수 있어요.</p>

    <div class="calc-layout">
      <div class="card card-pad">
        <div class="field">
          <label>월 실수령액 <span class="hint">세후</span></label>
          <div class="input-suffix"><input class="input" type="number" id="net" value="280" min="0" step="10"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>배분 원칙</label>
          <div class="chips" id="rule">
            <button class="chip on" data-v="503020">50·30·20 법칙</button>
            <button class="chip" data-v="save40">저축 강화 (40%)</button>
            <button class="chip" data-v="custom">직접 조정</button>
          </div>
        </div>
        <div id="sliders">
          <div class="field">
            <label>고정지출 <span class="hint">월세·통신·보험</span></label>
            <div class="range-row"><input type="range" id="fixed" min="0" max="80" step="1" value="50"><span class="range-val" id="fixed-val"></span></div>
          </div>
          <div class="field">
            <label>생활·여가</label>
            <div class="range-row"><input type="range" id="life" min="0" max="80" step="1" value="30"><span class="range-val" id="life-val"></span></div>
          </div>
          <div class="field">
            <label>저축·투자</label>
            <div class="range-row"><input type="range" id="save" min="0" max="80" step="1" value="20"><span class="range-val" id="save-val"></span></div>
          </div>
          <p class="note" id="sum-note"></p>
        </div>
      </div>

      <div>
        <div class="result-hero">
          <div class="label">매달 저축·투자</div>
          <div class="big"><span id="r-save">–</span></div>
          <div class="small" id="r-year" style="color:#aeb7cc;margin-top:6px"></div>
        </div>
        <div class="card" style="margin-bottom:12px">
          <h3 style="font-size:16px;color:var(--navy);margin-bottom:10px">배분 구성</h3>
          <div id="donut" class="chart-box"></div>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="k">고정지출</div><div class="v" id="r-fixed">–</div></div>
          <div class="stat"><div class="k">생활·여가</div><div class="v" id="r-life">–</div></div>
        </div>
        <div class="lead-cta">
          <h3>저축액, 어떻게 굴릴까?</h3>
          <p>매달 저축액을 복리로 굴리면 얼마가 되는지 복리 계산기에서 확인하세요.</p>
          <a class="btn btn-ghost" href="compound.html">복리 계산 →</a>
        </div>
        <p class="note">※ 50·30·20 법칙: 필수지출 50% · 여가 30% · 저축·투자 20%. 상황에 맞게 조정하세요.</p>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>

  <script src="../assets/js/app.js"></script>
  <script>
    const S = { net: 280, rule: "503020", fixed: 50, life: 30, save: 20 };
    const PRESETS = { "503020": [50, 30, 20], save40: [40, 20, 40] };
    function setSliders(a) {
      S.fixed = a[0]; S.life = a[1]; S.save = a[2];
      ["fixed", "life", "save"].forEach((k, i) => {
        document.getElementById(k).value = a[i];
        document.getElementById(k + "-val").textContent = a[i] + "%";
      });
    }
    function render() {
      const total = S.fixed + S.life + S.save;
      const fixedAmt = (S.net * S.fixed) / 100;
      const lifeAmt = (S.net * S.life) / 100;
      const saveAmt = (S.net * S.save) / 100;
      document.getElementById("r-save").innerHTML = HP.fmtMan(saveAmt) + '<span class="unit"> 원</span>';
      document.getElementById("r-year").textContent = `연 ${HP.fmtMan(saveAmt * 12)} · 저축률 ${Math.round(S.save)}%`;
      document.getElementById("r-fixed").textContent = HP.fmtMan(fixedAmt);
      document.getElementById("r-life").textContent = HP.fmtMan(lifeAmt);
      HP.donut(document.getElementById("donut"), [
        { value: fixedAmt, color: "var(--navy)", label: "고정지출" },
        { value: lifeAmt, color: "#8a94ac", label: "생활·여가" },
        { value: saveAmt, color: "var(--accent)", label: "저축·투자" },
      ]);
      const note = document.getElementById("sum-note");
      note.textContent = total === 100 ? "합계 100% ✓" : `합계 ${total}% — 100%가 되도록 조정하세요.`;
      note.style.color = total === 100 ? "var(--good)" : "var(--accent)";
    }
    document.getElementById("net").oninput = (e) => { S.net = +e.target.value || 0; render(); };
    document.querySelectorAll("#rule .chip").forEach((c) => c.onclick = () => {
      document.querySelectorAll("#rule .chip").forEach((x) => x.classList.remove("on"));
      c.classList.add("on"); S.rule = c.dataset.v;
      if (PRESETS[S.rule]) setSliders(PRESETS[S.rule]);
      render();
    });
    ["fixed", "life", "save"].forEach((k) => document.getElementById(k).oninput = (e) => {
      S[k] = +e.target.value;
      document.getElementById(k + "-val").textContent = e.target.value + "%";
      document.querySelectorAll("#rule .chip").forEach((x) => x.classList.remove("on"));
      document.querySelector('#rule .chip[data-v="custom"]').classList.add("on");
      S.rule = "custom"; render();
    });
    HP.mount("salary");
    setSliders(PRESETS["503020"]);
    render();
  </script>
</body>
</html>
