<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월급배분 계산기 | 실수령액 저축·투자·소비 자동 배분 — 홈플래닝</title>
  <meta name="description" content="월 실수령액을 넣으면 50-30-20 등 원칙에 따라 고정지출·생활비·저축·투자로 자동 배분. 사회초년생 예산 관리." />
  <meta name="keywords" content="월급배분 계산기, 50 30 20 법칙, 예산 관리, 사회초년생 재테크, 월급 관리" />
  <link rel="canonical" href="https://homeplaning.kr/calculators/salary.html" />
  <link rel="stylesheet" href="../assets/css/style.css?v=2" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1976d2" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="월급배분 계산기 — 홈플래닝" />
  <meta property="og:description" content="실수령액을 저축·고정지출·생활로 자동 배분." />
  <meta property="og:url" content="https://homeplaning.kr/calculators/salary.html" />
  <meta property="og:image" content="https://homeplaning.kr/assets/og/salary-calc.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="홈플래닝" />
  <meta property="og:locale" content="ko_KR" />
  <meta name="twitter:card" content="summary_large_image" />
</head>
<body>
  <div id="app-header"></div>
  <main class="wrap" style="padding-top:32px">
    <div class="eyebrow">월급배분 계산기</div>
    <h1 style="font-size:clamp(26px,4.5vw,36px);color:var(--navy)">월급, 어떻게 나눠야 할까?</h1>
    <p class="muted" style="margin:10px 0 24px;max-width:640px">실수령액을 넣고, <strong>금액이나 비율 중 편한 쪽을 입력</strong>하세요. 하나를 바꾸면 나머지가 자동으로 계산되고 그래프가 조절됩니다.</p>

    <div class="calc-layout">
      <div class="card card-pad">
        <div class="field">
          <label>월 실수령액 <span class="hint">세후</span></label>
          <div class="input-suffix"><input class="input" type="number" id="net" value="280" min="0" step="10" autocomplete="off"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>배분 원칙</label>
          <div class="chips" id="rule">
            <button class="chip on" data-v="503020">저축 우선 50·30·20</button>
            <button class="chip" data-v="save80">저축 강화 (80%)</button>
            <button class="chip" data-v="custom">직접 조정</button>
          </div>
        </div>
        <div id="alloc">
          <div class="field">
            <label><span class="cat-dot" style="background:var(--accent)"></span>저축·투자 <span class="hint">적금·펀드·비상금</span></label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="input-suffix"><input class="input" type="number" id="save-amt" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">만원</span></div>
              <div class="input-suffix"><input class="input" type="number" id="save-pct" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">%</span></div>
            </div>
          </div>
          <div class="field">
            <label><span class="cat-dot" style="background:var(--navy)"></span>고정지출 <span class="hint">월세·통신·보험</span></label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="input-suffix"><input class="input" type="number" id="fixed-amt" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">만원</span></div>
              <div class="input-suffix"><input class="input" type="number" id="fixed-pct" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">%</span></div>
            </div>
          </div>
          <div class="field">
            <label><span class="cat-dot" style="background:#9e9e9e"></span>생활·여가 <span class="hint">식비·쇼핑·취미</span></label>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="input-suffix"><input class="input" type="number" id="life-amt" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">만원</span></div>
              <div class="input-suffix"><input class="input" type="number" id="life-pct" min="0" step="1" inputmode="numeric" autocomplete="off" style="text-align:right"><span class="suffix">%</span></div>
            </div>
          </div>
          <div class="sum-box" id="sum-box"><span id="sum-msg"></span><span class="total" id="sum-total"></span></div>
        </div>
      </div>

      <div>
        <div class="card card-pad" style="margin-bottom:14px">
          <h3 style="font-size:16px;color:var(--navy);margin-bottom:14px">월급 배분 구성</h3>
          <div id="donut"></div>
        </div>

        <div class="result-hero">
          <div class="label">매달 저축·투자하는 금액</div>
          <div class="big"><span id="r-save">–</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
            <div class="hero-stat"><div class="k">연간 저축액</div><div class="v" id="r-year">–</div></div>
            <div class="hero-stat"><div class="k">저축률</div><div class="v accent" id="r-rate">–</div></div>
          </div>
        </div>

        <a href="goal.html" id="next-goal" class="cta-orange">
          <div>
            <div class="t">이 금액으로 목표까지 몇 년?</div>
            <div class="s" id="cta-sub">연간 – 저축</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <div class="share-box" id="share"></div>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>

  <script src="../assets/js/config.js?v=2"></script>
  <script src="../assets/js/analytics.js?v=1"></script>
  <script src="../assets/js/app.js?v=13"></script>
  <script>
    // 상태: 각 항목은 '퍼센트'가 기준값(정확한 실수). 금액 = 실수령액 × %/100.
    // 50·30·20 — 저축·투자 50 / 고정지출 30 / 생활·여가 20 (저축 우선 배분)
    const S = { net: 280, rule: "503020", fixed: 30, life: 20, save: 50 };
    const PRESETS = { "503020": [30, 20, 50], save80: [15, 5, 80] };
    const KEYS = ["fixed", "life", "save"];
    const LIFE_COLOR = "#9e9e9e";

    // 상태 → 입력칸(금액·%) 동기화
    function syncInputs() {
      KEYS.forEach((k) => {
        document.getElementById(k + "-amt").value = Math.round((S.net * S[k]) / 100);
        document.getElementById(k + "-pct").value = Math.round(S[k]);
      });
      HP.refreshAmountHints();
    }
    function markCustom() {
      document.querySelectorAll("#rule .chip").forEach((x) => x.classList.remove("on"));
      document.querySelector('#rule .chip[data-v="custom"]').classList.add("on");
      S.rule = "custom";
    }
    function render() {
      const total = S.fixed + S.life + S.save;
      const A = (k) => (S.net * S[k]) / 100;
      const fixedAmt = A("fixed"), lifeAmt = A("life"), saveAmt = A("save");
      document.getElementById("r-save").innerHTML = HP.fmtMan(saveAmt) + '<span class="unit"> 원</span>';
      document.getElementById("r-year").textContent = HP.fmtMan(saveAmt * 12) + "원";
      document.getElementById("r-rate").textContent = Math.round(S.save) + "%";
      document.getElementById("cta-sub").textContent = "연간 " + HP.fmtMan(saveAmt * 12) + "원 저축";
      // 저축액을 자산목표 계산기로 그대로 넘긴다 (도달 기간 모드로)
      document.getElementById("next-goal").href =
        HP.withParams("goal.html", { mode: "years", monthly: saveAmt, from: "salary" });
      HP.donutPanel(document.getElementById("donut"), [
        { value: fixedAmt, color: "var(--navy)", label: "고정지출", display: HP.fmtMan(fixedAmt) + "원" },
        { value: lifeAmt, color: LIFE_COLOR, label: "생활·여가", display: HP.fmtMan(lifeAmt) + "원" },
        { value: saveAmt, color: "var(--accent)", label: "저축·투자", display: HP.fmtMan(saveAmt) + "원" },
      ], { centerLabel: Math.round(S.save) + "%", centerSub: "저축률" });
      const rt = Math.round(total);
      const box = document.getElementById("sum-box");
      box.className = "sum-box " + (rt === 100 ? "ok" : "warn");
      document.getElementById("sum-msg").textContent =
        rt === 100 ? "배분 완료 — 남는 돈 없이 100%" : "합계가 100%가 되도록 맞춰보세요";
      document.getElementById("sum-total").textContent = `합계 ${rt}%`;
    }

    // 월 실수령액 변경 → 비율 유지하며 금액 재계산
    document.getElementById("net").oninput = (e) => { S.net = +e.target.value || 0; syncInputs(); render(); };

    // 프리셋(50·30·20 등)
    document.querySelectorAll("#rule .chip").forEach((c) => c.onclick = () => {
      document.querySelectorAll("#rule .chip").forEach((x) => x.classList.remove("on"));
      c.classList.add("on"); S.rule = c.dataset.v;
      if (PRESETS[S.rule]) { const a = PRESETS[S.rule]; S.fixed = a[0]; S.life = a[1]; S.save = a[2]; syncInputs(); }
      render();
    });

    // 양방향 연동: 금액 입력 → % 자동 / % 입력 → 금액 자동
    KEYS.forEach((k) => {
      document.getElementById(k + "-amt").oninput = (e) => {
        const a = +e.target.value || 0;
        S[k] = S.net > 0 ? (a / S.net) * 100 : 0;
        document.getElementById(k + "-pct").value = Math.round(S[k]); // 반대편만 갱신
        HP.refreshAmountHints();
        markCustom(); render();
      };
      document.getElementById(k + "-pct").oninput = (e) => {
        const p = +e.target.value || 0;
        S[k] = p;
        document.getElementById(k + "-amt").value = Math.round((S.net * p) / 100); // 반대편만 갱신
        HP.refreshAmountHints();
        markCustom(); render();
      };
    });

    HP.mount("salary");

    // 링크로 넘어온 값 반영 (외부 입력이라 범위 검증을 거친다)
    const IN = HP.readParams({
      net: { min: 0, max: 100000 },
      save: { min: 0, max: 100 }, fixed: { min: 0, max: 100 }, life: { min: 0, max: 100 },
    });
    Object.assign(S, IN);
    if (IN.net !== undefined) document.getElementById("net").value = Math.round(S.net);
    if (IN.save !== undefined || IN.fixed !== undefined || IN.life !== undefined) markCustom();

    syncInputs();
    render();
    HP.refreshAmountHints();
    HP.initShare(document.getElementById("share"), () => ({
      net: S.net, save: S.save, fixed: S.fixed, life: S.life, from: "salary",
    }));
  </script>
</body>
</html>
