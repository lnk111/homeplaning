<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자산목표 계산기 | 1억 모으려면 매달 얼마씩·몇 년? — 홈플래닝</title>
  <meta name="description" content="목표 금액을 정하면 매달 얼마씩 저축해야 하는지, 또는 몇 년이 걸리는지 역산해 드립니다. 수익률까지 반영." />
  <meta name="keywords" content="자산목표 계산기, 1억 모으기, 저축 계획, 목표 저축액 계산, 종잣돈 계산" />
  <link rel="canonical" href="https://homeplaning.kr/calculators/goal.html" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="app-header"></div>
  <main class="wrap" style="padding-top:32px">
    <div class="eyebrow">자산목표 계산기</div>
    <h1 style="font-size:clamp(26px,4.5vw,36px);color:var(--text)">목표까지, 매달 얼마씩 · 몇 년?</h1>
    <p class="muted" style="margin:10px 0 24px;max-width:640px">모으고 싶은 금액을 정하면 필요한 월 저축액과 도달 기간을 역산합니다.</p>

    <div class="calc-layout">
      <div class="card card-pad">
        <div class="field">
          <label>모드</label>
          <div class="chips" id="mode">
            <button class="chip on" data-v="monthly">필요 월 저축액</button>
            <button class="chip" data-v="years">도달 기간</button>
          </div>
        </div>
        <div class="field">
          <label>목표 금액</label>
          <div class="input-suffix"><input class="input" type="number" id="target" value="10000" min="100" step="500"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>현재 보유 자산</label>
          <div class="input-suffix"><input class="input" type="number" id="current" value="2000" min="0" step="100"><span class="suffix">만원</span></div>
        </div>
        <div class="field">
          <label>연 수익률 <span class="hint">저축·투자 기대치</span></label>
          <div class="input-suffix"><input class="input" type="number" id="rate" value="4" min="0" max="30" step="0.5" inputmode="decimal" autocomplete="off"><span class="suffix">%</span></div>
        </div>
        <div class="field" id="years-field">
          <label>목표 기간</label>
          <div class="input-suffix"><input class="input" type="number" id="years" value="10" min="1" max="60" step="1" inputmode="numeric" autocomplete="off"><span class="suffix">년</span></div>
        </div>
        <div class="field" id="monthly-field" style="display:none">
          <label>매월 저축 가능액</label>
          <div class="input-suffix"><input class="input" type="number" id="monthly" value="80" min="1" step="5"><span class="suffix">만원</span></div>
        </div>
      </div>

      <div id="result-col">
        <div class="result-hero">
          <div class="label" id="out-label">필요 월 저축액</div>
          <div class="big"><span id="r-main">–</span></div>
          <div class="small" id="r-sub" style="color:rgba(255,255,255,.7);margin-top:6px"></div>
        </div>
        <div class="card card-pad" style="margin-bottom:12px">
          <h3 style="font-size:18px;color:var(--text)">투자 결과</h3>
          <p class="muted small" style="margin:6px 0 18px">복리의 힘으로 시간이 지날수록 자산이 어떻게 쌓여 가는지 한눈에 확인해 보세요.</p>

          <div class="res-grid">
            <div class="res-stat"><div class="k">총 투자 결과</div><div class="v accent" id="g-total">–</div></div>
            <div class="res-stat"><div class="k">총 투자금액</div><div class="v" id="g-principal">–</div></div>
          </div>
          <hr class="res-div">
          <div class="res-grid">
            <div class="res-stat"><div class="k">총 수익률</div><div class="v accent" id="g-rate">–</div></div>
            <div class="res-stat"><div class="k">총 이자수익</div><div class="v" id="g-interest">–</div></div>
          </div>

          <div class="prop-head"><span class="pl" id="g-plabel">납입금 –</span><span class="pr" id="g-ylabel">수익금 –</span></div>
          <div class="prop-bar"><span class="pb-seg pb-base" id="g-pbar"></span><span class="pb-seg pb-top" id="g-ybar"></span></div>

          <div id="chart" style="margin-top:20px"></div>
        </div>
        <a href="home-afford.html" id="next-home" class="cta-orange">
          <div>
            <div class="t">이 종잣돈으로 살 수 있는 집은?</div>
            <div class="s" id="next-home-sub">– 을 종잣돈으로 매매가 계산</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <div class="share-box" id="share"></div>

        <p class="note">※ 결과는 참고용 추정치입니다. 실제 수익률은 변동합니다.</p>
      </div>
    </div>
  </main>
  <div id="app-footer"></div>

  <script src="../assets/js/config.js?v=2"></script>
  <script src="../assets/js/analytics.js?v=1"></script>
  <script src="../assets/js/app.js?v=13"></script>
  <script>
    const S = { mode: "monthly", target: 10000, current: 2000, rate: 4, years: 10, monthly: 80 };

    // 필요 월 저축액: FV = current*(1+r)^n + PMT*[((1+r)^n -1)/r]
    function requiredMonthly() {
      const r = S.rate / 100 / 12, n = S.years * 12;
      const fvCurrent = S.current * Math.pow(1 + r, n);
      const need = S.target - fvCurrent;
      if (need <= 0) return 0;
      if (r === 0) return need / n;
      return need / ((Math.pow(1 + r, n) - 1) / r);
    }
    // 도달 기간(개월): 매월 monthly 저축 시 target 도달까지
    function monthsToReach() {
      const r = S.rate / 100 / 12;
      let bal = S.current, m = 0;
      while (bal < S.target && m < 12 * 80) { bal = bal * (1 + r) + S.monthly; m++; }
      return m >= 12 * 80 ? null : m;
    }
    // 연도별 지점: 납입원금(base) + 총자산(total)
    function pointsFor(monthly, months) {
      const r = S.rate / 100 / 12;
      const arr = [{ year: 0, base: S.current, total: S.current }];
      let bal = S.current;
      for (let m = 1; m <= months; m++) {
        bal = bal * (1 + r) + monthly;
        if (m % 12 === 0) arr.push({ year: m / 12, base: S.current + monthly * m, total: bal });
      }
      if (months % 12 !== 0) arr.push({ year: months / 12, base: S.current + monthly * months, total: bal });
      return arr;
    }
    function fillResult(monthly, months) {
      const pts = pointsFor(monthly, months);
      const last = pts[pts.length - 1];
      const principal = last.base, final = last.total, interest = Math.max(0, final - principal);
      const roi = principal > 0 ? (interest / principal) * 100 : 0;
      document.getElementById("g-total").textContent = HP.fmtMan(final) + "원";
      document.getElementById("g-principal").textContent = HP.fmtMan(principal) + "원";
      document.getElementById("g-rate").textContent = roi.toFixed(2) + "%";
      document.getElementById("g-interest").textContent = HP.fmtMan(interest) + "원";
      const pPct = final > 0 ? Math.round((principal / final) * 100) : 0, yPct = 100 - pPct;
      document.getElementById("g-plabel").textContent = `납입금 ${pPct}%`;
      document.getElementById("g-ylabel").textContent = `수익금 ${yPct}%`;
      document.getElementById("g-pbar").style.width = pPct + "%";
      document.getElementById("g-ybar").style.width = yPct + "%";
      HP.lineChart(document.getElementById("chart"), {
        points: pts, baseColor: "rgba(0,0,0,.38)", totalColor: "var(--accent)",
        fmt: (v) => HP.fmtMan(v) + "원", axisFmt: (v) => (v ? HP.fmtManShort(v) : "0"),
      });
    }
    function clearResult(msg) {
      ["g-total", "g-principal", "g-rate", "g-interest"].forEach((id) => document.getElementById(id).textContent = "–");
      document.getElementById("g-plabel").textContent = "납입금 –";
      document.getElementById("g-ylabel").textContent = "수익금 –";
      document.getElementById("g-pbar").style.width = "0%";
      document.getElementById("g-ybar").style.width = "0%";
      document.getElementById("chart").innerHTML = `<p class="note" style="text-align:center;padding:24px 0">${msg || ""}</p>`;
    }
    function render() {
      if (S.mode === "monthly") {
        const pmt = requiredMonthly();
        document.getElementById("out-label").textContent = "필요 월 저축액";
        document.getElementById("r-main").innerHTML = HP.fmtManWon(pmt).replace("원", "") + '<span class="unit"> 원/월</span>';
        document.getElementById("r-sub").textContent = `${S.years}년간 매달 저축하면 목표 ${HP.fmtMan(S.target)} 달성`;
        fillResult(pmt, S.years * 12);
      } else {
        const months = monthsToReach();
        document.getElementById("out-label").textContent = "목표 도달 기간";
        if (months === null) {
          document.getElementById("r-main").innerHTML = "80년+";
          document.getElementById("r-sub").textContent = "월 저축액을 늘려야 현실적인 기간에 도달합니다.";
          clearResult("월 저축액을 늘리면 결과가 표시됩니다.");
        } else {
          const y = Math.floor(months / 12), mo = months % 12;
          document.getElementById("r-main").innerHTML = y + '<span class="unit">년</span> ' + mo + '<span class="unit">개월</span>';
          document.getElementById("r-sub").textContent = `매달 ${HP.fmtMan(S.monthly)}씩 저축 시`;
          fillResult(S.monthly, months);
        }
      }
      updateNextLink();
    }
    // 목표 금액을 내집찾기의 '보유 종잣돈'으로 넘긴다
    function updateNextLink() {
      document.getElementById("next-home").href =
        HP.withParams("home-afford.html", { cash: S.target, from: "goal" });
      document.getElementById("next-home-sub").textContent =
        `${HP.fmtMan(S.target)}을 종잣돈으로 매매가 계산`;
    }
    function setMode(v) {
      S.mode = v;
      document.getElementById("years-field").style.display = v === "monthly" ? "" : "none";
      document.getElementById("monthly-field").style.display = v === "years" ? "" : "none";
      render();
    }
    document.querySelectorAll("#mode .chip").forEach((c) => c.onclick = () => {
      document.querySelectorAll("#mode .chip").forEach((x) => x.classList.remove("on"));
      c.classList.add("on"); setMode(c.dataset.v);
    });
    ["target", "current", "monthly", "rate"].forEach((id) =>
      document.getElementById(id).oninput = (e) => { S[id] = +e.target.value || 0; render(); });
    document.getElementById("years").oninput = (e) => { S.years = +e.target.value || 1; render(); };
    HP.mount("goal");

    // 링크로 넘어온 값 반영
    const IN = HP.readParams({
      mode: { allow: ["monthly", "years"] },
      target: { min: 100, max: 1000000 },
      current: { min: 0, max: 1000000 },
      monthly: { min: 0, max: 100000 },
      rate: { min: 0, max: 30 },
      years: { min: 1, max: 60 },
    });
    Object.assign(S, IN);
    ["target", "current", "monthly", "rate", "years"].forEach((id) => {
      if (IN[id] !== undefined) document.getElementById(id).value = Math.round(S[id] * 100) / 100;
    });
    if (IN.mode) {
      document.querySelectorAll("#mode .chip").forEach((x) =>
        x.classList.toggle("on", x.dataset.v === IN.mode));
    }
    setMode(S.mode); // 모드에 맞춰 입력칸 표시 + render()
    HP.refreshAmountHints();

    // 어디서 무엇을 받아왔는지 알린다
    const got = [];
    if (IN.monthly !== undefined) got.push({ k: "월 저축액", v: HP.fmtMan(S.monthly) + "원" });
    if (IN.current !== undefined) got.push({ k: "보유 자산", v: HP.fmtMan(S.current) + "원" });
    if (IN.rate !== undefined) got.push({ k: "수익률", v: S.rate + "%" });
    HP.handoffNotice(document.getElementById("result-col"), got);

    HP.initShare(document.getElementById("share"), () => ({
      mode: S.mode, target: S.target, current: S.current,
      monthly: S.monthly, rate: S.rate, years: S.years, from: "goal",
    }));
  </script>
</body>
</html>
