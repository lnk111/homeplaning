name: 정책 자동 갱신 (AI)

on:
  schedule:
    # 매일 21:00 UTC = 06:00 KST
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write   # 실패 알림 이슈 등록용

jobs:
  update-policy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 시크릿 존재 확인
        run: |
          if [[ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]]; then
            echo "::error::ANTHROPIC_API_KEY 시크릿이 비어 있습니다. Settings → Secrets and variables → Actions → Repository secrets 에 등록하세요."
            exit 1
          fi
          echo "시크릿 확인됨 (길이 표시 안 함)"

      - name: AI 정책 갱신 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # 실패 원인을 이슈에 그대로 싣기 위해 출력을 파일로도 남긴다.
        # (로그를 열어보지 않고 알림만으로 판단할 수 있게)
        run: |
          set -o pipefail
          npm run update-policy 2>&1 | tee /tmp/update-policy.log

      - name: 변경사항 커밋 & 푸시
        run: |
          if [[ -n "$(git status --porcelain data/policy.json)" ]]; then
            git config user.name "homeplaning-bot"
            git config user.email "bot@homeplaning.kr"
            git add data/policy.json
            git commit -m "chore: 정책 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi

      # 조용히 썩는 걸 막는다. 실패하면 이슈로 올려 알림이 가게 한다.
      - name: 실패 시 이슈 등록
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "정책 자동 갱신 실패 — 계산기 데이터가 낡고 있습니다";
            // 스크립트가 남긴 실제 오류 메시지를 이슈에 그대로 싣는다.
            // 로그를 열지 않고도 크레딧 문제인지 키 문제인지 바로 알 수 있게.
            let log = "";
            try { log = fs.readFileSync("/tmp/update-policy.log", "utf8").trim().slice(-1200); } catch (e) {}
            const errBlock = log
              ? ["실제 오류 메시지:", "```", log, "```"].join("\n")
              : "_오류 메시지를 읽지 못했습니다. 아래 실행 로그를 확인하세요._";
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "policy-pipeline",
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number,
                body: [`또 실패했습니다 — ${runUrl}`, ``, errBlock].join("\n"),
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, labels: ["policy-pipeline"],
              body: [
                `정책 자동 갱신 워크플로가 실패했습니다.`,
                ``,
                errBlock,
                ``,
                `실행 로그: ${runUrl}`,
                ``,
                `확인 순서:`,
                `1. Anthropic Console의 크레딧 잔액 — 가장 흔한 원인입니다.`,
                `2. \`ANTHROPIC_API_KEY\` 시크릿이 폐기되지 않았는지.`,
                `3. 위 둘이 정상이면 로그의 에러 메시지를 확인하세요.`,
                ``,
                `방치하면 계산기 하단 '정책 기준일'이 낡은 채 노출됩니다.`,
                `(3일 경과 시 화면에 지연 경고가 자동으로 표시됩니다.)`,
              ].join("\n"),
            });
