name: 정책 자동 갱신 (AI)

on:
  schedule:
    # 매일 21:00 UTC = 06:00 KST
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-policy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 시크릿 존재 확인
        run: |
          if [[ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]]; then
            echo "::error::ANTHROPIC_API_KEY 시크릿이 비어 있습니다. Settings → Secrets and variables → Actions → Repository secrets 에 등록하세요."
            exit 1
          fi
          echo "시크릿 확인됨 (길이 표시 안 함)"

      - name: AI 정책 갱신 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run update-policy

      - name: 변경사항 커밋 & 푸시
        run: |
          if [[ -n "$(git status --porcelain data/policy.json)" ]]; then
            git config user.name "homeplaning-bot"
            git config user.email "bot@homeplaning.kr"
            git add data/policy.json
            git commit -m "chore: 정책 데이터 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "변경 없음 — 커밋 생략"
          fi
